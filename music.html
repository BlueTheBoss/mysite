<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlayer | armevox</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%230D1824'/%3E%3Cpath fill='%235B8DB8' d='M35 25h30v40c0 5.5-4.5 10-10 10s-10-4.5-10-10 4.5-10 10-10v-25h-20v25c0 5.5-4.5 10-10 10s-10-4.5-10-10 4.5-10 10-10v-30z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="music-player.css">
</head>
<body class="vibe-page">
    <div class="custom-cursor"></div>

    <!-- Header -->
    <header class="vibe-header">
        <a href="/" class="back-btn" id="back-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Home
        </a>
        <span class="vibe-wordmark">✦ armevox <span class="vibe-tag">VibePlayer</span></span>
        <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
    </header>

    <!-- Main -->
    <main class="vibe-main">
        <div class="vibe-grid">

        <!-- Player Card -->
        <div class="player-card">

            <!-- Visualizer Strip -->
            <div class="visualizer" id="visualizer">
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
            </div>

            <!-- Track Info -->
            <div class="track-info-block">
                <div class="now-playing-badge">Now Playing</div>
                <h1 id="track-title">—</h1>
                <p id="track-artist">—</p>
            </div>

            <!-- Progress -->
            <div class="progress-section">
                <div class="time-row">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-track" id="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-thumb" id="progress-thumb"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-row">
                <button id="shuffle-btn" class="ctrl-btn ctrl-xs" aria-label="Shuffle" title="Shuffle">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59,9.17L5.41,4L4,5.41l5.17,5.17L10.59,9.17z M14.5,4l2.04,2.04L4,18.59L5.41,20L17.96,7.44L20,9.5V4H14.5z M14.83,13.41l-1.41,1.41l3.13,3.13L14.5,20H20v-5.5l-2.04,2.04L14.83,13.41z"/></svg>
                </button>
                <button id="prev-btn" class="ctrl-btn ctrl-sm" aria-label="Previous">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                </button>
                <button id="play-pause-btn" class="ctrl-btn ctrl-lg" aria-label="Play">
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="next-btn" class="ctrl-btn ctrl-sm" aria-label="Next">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button id="repeat-btn" class="ctrl-btn ctrl-xs" aria-label="Repeat" title="Repeat">
                    <svg id="repeat-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M7,7h10v3l4-4l-4-4v3H5v6h2V7z M17,17H7v-3l-4,4l4,4v-3h12v-6h-2V17z"/></svg>
                    <svg id="repeat-one-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M7,7h10v3l4-4l-4-4v3H5v6h2V7z M17,17H7v-3l-4,4l4,4v-3h12v-6h-2V17z M10,15V13H12V9H10V11H12V15H10Z"/></svg>
                </button>
            </div>

            <!-- Volume -->
            <div class="volume-row">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volume-slider" value="80" min="0" max="100" class="v-slider">
                <span id="volume-label">80%</span>
            </div>
        </div>

        <!-- Playlist -->
        <div class="playlist-card">
            <div class="playlist-card-header">
                <h2>Secret Playlist</h2>
                <span id="playlist-count" class="pl-count">0 tracks</span>
            </div>
            <ul id="playlist" class="playlist-list"></ul>
        </div>

        </div><!-- /vibe-grid -->
    </main>

    <audio id="audio-player" preload="metadata"></audio>
    <script src="music-player.js"></script>
</body>
</html>
